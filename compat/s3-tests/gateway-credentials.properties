# S3 access keys for the ceph/s3-tests accounts (see s3tests.conf.in) — DEV/CI ONLY.
# Mounted into the s3-gateway container by docker-compose.ci.yml with s3.auth.enabled=true,
# so the compat suite exercises real SigV4 verification and the ACL/anonymous semantics.
s3.key.candybox.secret = candybox
s3.key.candybox.principal = User:candybox-main
s3.key.candyalt.secret = candyalt
s3.key.candyalt.principal = User:candybox-alt
s3.key.candytenant.secret = candytenant
s3.key.candytenant.principal = User:candybox-tenant
s3.key.candyiam.secret = candyiam
s3.key.candyiam.principal = User:candybox-iam
s3.key.candyroot.secret = candyroot
s3.key.candyroot.principal = User:candybox-iam-root
s3.key.candyaltroot.secret = candyaltroot
s3.key.candyaltroot.principal = User:candybox-iam-altroot
