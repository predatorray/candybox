name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast unit tests: hand-written fakes only, no BookKeeper/ZooKeeper/sockets.
  unit-tests:
    name: Unit tests (mvn test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile and package (no tests)
        run: mvn -q -B -ntp -DskipTests package

      - name: Run unit tests
        run: mvn -B -ntp test

  # Integration tests: *IT.java on embedded BookKeeper + in-JVM ZooKeeper.
  integration-tests:
    name: Integration tests (mvn verify)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run integration tests
        run: mvn -B -ntp verify
